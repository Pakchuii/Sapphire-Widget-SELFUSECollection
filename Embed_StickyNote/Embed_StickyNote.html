<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>便签</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw; height: 100vh;
            overflow: hidden; background: transparent;
            font-family: "ZCOOL KuaiLe", "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        .note-container {
            width: 100%; height: 100%;
            border-radius: 16px;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background 0.4s ease, box-shadow 0.4s ease, color 0.4s ease;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12);
        }

        /* Color themes */
        .theme-white  { background: rgba(255,255,255,0.92); color: #374151; }
        .theme-yellow { background: rgba(255,250,230,0.92); color: #5d4037; }
        .theme-pink   { background: rgba(255,228,236,0.92); color: #9b1c5a; }
        .theme-blue   { background: rgba(225,240,255,0.92); color: #1e40af; }
        .theme-green  { background: rgba(225,250,235,0.92); color: #166534; }
        .theme-purple { background: rgba(240,230,255,0.92); color: #5b21b6; }

        /* Header bar */
        .note-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px 4px 12px;
            flex-shrink: 0; user-select: none; -webkit-user-select: none;
        }

        .header-left { display: flex; align-items: center; gap: 2px; }
        .header-right { display: flex; align-items: center; gap: 4px; }

        .note-title {
            font-size: 13px; font-weight: 700;
            opacity: 0.5; letter-spacing: 0.5px;
        }

        /* Tool buttons */
        .tool-btn {
            background: none; border: none;
            font-size: 14px; cursor: pointer;
            opacity: 0.4; transition: opacity 0.2s;
            padding: 2px 6px; border-radius: 6px;
            line-height: 1;
        }
        .tool-btn:hover { opacity: 0.8; background: rgba(0,0,0,0.05); }

        .clear-btn { opacity: 0; font-size: 13px; }
        .note-container:hover .clear-btn { opacity: 0.3; }
        .clear-btn:hover { opacity: 0.7 !important; }

        /* Dropdowns */
        .dropdown {
            display: none; position: absolute;
            top: 34px;
            background: rgba(255,255,255,0.97);
            border-radius: 12px; padding: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid rgba(0,0,0,0.08);
            z-index: 20;
        }
        .dropdown.show { display: flex; }

        /* Color picker */
        .color-picker {
            left: 10px; gap: 6px;
            flex-wrap: wrap; width: 120px;
        }

        .color-dot {
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; border: 2px solid rgba(0,0,0,0.08);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .color-dot:hover { transform: scale(1.15); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .color-dot.active { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }

        .dot-white  { background: #ffffff; border-color: rgba(0,0,0,0.12); }
        .dot-yellow { background: #fef3c7; }
        .dot-pink   { background: #fce7f3; }
        .dot-blue   { background: #dbeafe; }
        .dot-green  { background: #d1fae5; }
        .dot-purple { background: #ede9fe; }

        /* Font size picker */
        .size-picker {
            left: 40px; flex-direction: column; gap: 2px;
            width: auto; min-width: 60px;
        }

        .size-option {
            padding: 5px 12px; border-radius: 8px;
            cursor: pointer; font-size: 13px;
            text-align: center; color: #374151;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .size-option:hover { background: rgba(0,0,0,0.06); }
        .size-option.active { background: rgba(99,102,241,0.12); color: #6366f1; font-weight: 700; }

        /* Content area */
        .note-content {
            flex: 1; padding: 6px 14px 14px 14px;
            font-size: 16px; line-height: 1.8;
            outline: none; overflow-y: auto;
            word-wrap: break-word; white-space: pre-wrap;
            transition: font-size 0.2s ease;
        }

        .note-content:empty::before {
            content: "点击此处开始输入...";
            opacity: 0.3; pointer-events: none;
        }

        .note-content::-webkit-scrollbar { width: 4px; }
        .note-content::-webkit-scrollbar-track { background: transparent; }
        .note-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="note-container theme-white" id="noteContainer" style="position:relative;">
        <div class="note-header">
            <div class="header-left">
                <button class="tool-btn" onclick="toggleDropdown('colorPicker')" title="颜色">🎨</button>
                <button class="tool-btn" onclick="toggleDropdown('sizePicker')" title="字号">Aa</button>
            </div>
            <div class="header-right">
                <span class="note-title">便签</span>
                <button class="tool-btn clear-btn" onclick="clearNote()" title="清空">🗑️</button>
            </div>
        </div>

        <!-- Color picker -->
        <div class="dropdown color-picker" id="colorPicker">
            <div class="color-dot dot-white active" data-theme="white"></div>
            <div class="color-dot dot-yellow" data-theme="yellow"></div>
            <div class="color-dot dot-pink" data-theme="pink"></div>
            <div class="color-dot dot-blue" data-theme="blue"></div>
            <div class="color-dot dot-green" data-theme="green"></div>
            <div class="color-dot dot-purple" data-theme="purple"></div>
        </div>

        <!-- Font size picker -->
        <div class="dropdown size-picker" id="sizePicker">
            <div class="size-option" data-size="12">小</div>
            <div class="size-option" data-size="14">较小</div>
            <div class="size-option active" data-size="16">中</div>
            <div class="size-option" data-size="20">较大</div>
            <div class="size-option" data-size="24">大</div>
            <div class="size-option" data-size="30">超大</div>
        </div>

        <div class="note-content" id="noteContent" contenteditable="true"></div>
    </div>

    <script>
        const STORAGE_KEY_TEXT = "stickyNoteText";
        const STORAGE_KEY_THEME = "stickyNoteTheme";
        const STORAGE_KEY_SIZE = "stickyNoteSize";

        function loadData() {
            const savedText = localStorage.getItem(STORAGE_KEY_TEXT);
            const savedTheme = localStorage.getItem(STORAGE_KEY_THEME);
            const savedSize = localStorage.getItem(STORAGE_KEY_SIZE);
            if (savedText !== null) document.getElementById("noteContent").innerHTML = savedText;
            if (savedTheme) setTheme(savedTheme, false);
            if (savedSize) setFontSize(savedSize, false);
        }

        function saveText() {
            localStorage.setItem(STORAGE_KEY_TEXT, document.getElementById("noteContent").innerHTML);
        }

        function setTheme(theme, save = true) {
            document.getElementById("noteContainer").className = "note-container theme-" + theme;
            document.querySelectorAll(".color-dot").forEach(d => d.classList.remove("active"));
            const dot = document.querySelector('.color-dot[data-theme="' + theme + '"]');
            if (dot) dot.classList.add("active");
            if (save) localStorage.setItem(STORAGE_KEY_THEME, theme);
            closeAllDropdowns();
        }

        function setFontSize(size, save = true) {
            document.getElementById("noteContent").style.fontSize = size + "px";
            document.querySelectorAll(".size-option").forEach(o => o.classList.remove("active"));
            const opt = document.querySelector('.size-option[data-size="' + size + '"]');
            if (opt) opt.classList.add("active");
            if (save) localStorage.setItem(STORAGE_KEY_SIZE, size);
            closeAllDropdowns();
        }

        function toggleDropdown(id) {
            const el = document.getElementById(id);
            const isOpen = el.classList.contains("show");
            closeAllDropdowns();
            if (!isOpen) el.classList.add("show");
        }

        function closeAllDropdowns() {
            document.querySelectorAll(".dropdown").forEach(d => d.classList.remove("show"));
        }

        function clearNote() {
            document.getElementById("noteContent").innerHTML = "";
            saveText();
        }

        // Color dot clicks
        document.querySelectorAll(".color-dot").forEach(dot => {
            dot.addEventListener("click", () => setTheme(dot.dataset.theme));
        });

        // Size option clicks
        document.querySelectorAll(".size-option").forEach(opt => {
            opt.addEventListener("click", () => setFontSize(opt.dataset.size));
        });

        // Close dropdowns when clicking outside
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".tool-btn") && !e.target.closest(".dropdown")) {
                closeAllDropdowns();
            }
        });

        // Auto-save
        let saveTimeout;
        document.getElementById("noteContent").addEventListener("input", () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveText, 300);
        });

        loadData();
    </script>
</body>
</html>
