<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>日历与倒计时</title>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:"Segoe UI","Microsoft YaHei",sans-serif;color:#2d3748}
.cal-card{width:100%;height:100%;border-radius:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(55px);-webkit-backdrop-filter:blur(55px);display:flex;flex-direction:column;padding:14px;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.5);overflow:hidden}

.countdown-section{margin-bottom:10px;flex-shrink:0}
.countdown-item{background:rgba(99,102,241,0.08);border-radius:10px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;animation:fadeIn 0.3s ease}
.countdown-label{font-size:13px;display:flex;align-items:center;gap:6px;color:#4a5568}
.countdown-days{font-size:18px;font-weight:700;color:#6366f1}
.countdown-days.past{color:#f87171}
.countdown-empty{font-size:12px;opacity:0.4;text-align:center;padding:8px}
.cd-delete{background:none;border:none;cursor:pointer;opacity:0.3;font-size:12px;transition:opacity 0.2s}
.cd-delete:hover{opacity:1}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0}
.cal-month{font-size:16px;font-weight:700;color:#2d3748}
.cal-nav-btn{background:none;border:none;color:#718096;font-size:18px;cursor:pointer;opacity:0.6;padding:2px 8px;transition:all 0.2s;border-radius:6px}
.cal-nav-btn:hover{opacity:1;background:rgba(99,102,241,0.1);color:#6366f1}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1;min-height:0}
.cal-header{font-size:10px;text-align:center;opacity:0.4;font-weight:700;padding:2px 0;color:#718096}
.cal-day{text-align:center;font-size:12px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;position:relative;min-height:0;padding:2px 0;color:#4a5568}
.cal-day:hover{background:rgba(99,102,241,0.1)}
.cal-day.today{background:rgba(99,102,241,0.2);font-weight:700;color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,0.3)}
.cal-day.other-month{opacity:0.2}
.cal-day.has-event::after{content:"";width:4px;height:4px;border-radius:50%;background:#f59e0b;position:absolute;bottom:2px}

.event-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);z-index:10;align-items:center;justify-content:center;border-radius:16px}
.event-overlay.show{display:flex}
.event-form{background:#fff;border-radius:16px;padding:24px;width:85%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.event-form h3{margin-bottom:14px;font-size:16px;text-align:center;color:#2d3748}
.ef-group{margin-bottom:10px}
.ef-group label{font-size:12px;display:block;margin-bottom:4px;color:#718096}
.ef-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;background:#f7fafc;color:#2d3748;font-size:14px;outline:none}
.ef-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.ef-btns{display:flex;gap:8px;margin-top:14px}
.ef-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.ef-btn-ok{background:#6366f1;color:#fff}
.ef-btn-ok:hover{background:#5558e6}
.ef-btn-cancel{background:#f1f5f9;color:#64748b}

.add-event-btn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;opacity:0.4;transition:opacity 0.2s;z-index:5}
.add-event-btn:hover{opacity:1}

@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="cal-card" style="position:relative">
    <button class="add-event-btn" onclick="showEventForm()">➕</button>
    <div class="countdown-section" id="countdownSection">
        <div class="countdown-empty">点击 ➕ 添加倒计时事件</div>
    </div>
    <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="event-overlay" id="eventOverlay">
        <div class="event-form">
            <h3>📅 添加事件</h3>
            <div class="ef-group"><label>事件名称</label><input class="ef-input" id="eventName" placeholder="如：生日、考试..." /></div>
            <div class="ef-group"><label>日期</label><input class="ef-input" id="eventDate" type="date" /></div>
            <div class="ef-group"><label>图标（可选）</label><input class="ef-input" id="eventIcon" placeholder="🎂" maxlength="4" style="width:80px" /></div>
            <div class="ef-btns">
                <button class="ef-btn-cancel" onclick="hideEventForm()">取消</button>
                <button class="ef-btn-ok" onclick="addEvent()">添加</button>
            </div>
        </div>
    </div>
</div>
<script>
let viewYear,viewMonth;
let events=JSON.parse(localStorage.getItem("calEvents")||"[]");
const today=new Date();
function init(){viewYear=today.getFullYear();viewMonth=today.getMonth();render();}
function render(){renderCalendar();renderCountdowns();}
function renderCalendar(){
    document.getElementById("calMonth").textContent=`${viewYear}年${viewMonth+1}月`;
    const grid=document.getElementById("calGrid");grid.innerHTML="";
    ["日","一","二","三","四","五","六"].forEach(h=>{const d=document.createElement("div");d.className="cal-header";d.textContent=h;grid.appendChild(d);});
    const firstDay=new Date(viewYear,viewMonth,1).getDay();
    const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
    const daysInPrev=new Date(viewYear,viewMonth,0).getDate();
    for(let i=firstDay-1;i>=0;i--){const d=document.createElement("div");d.className="cal-day other-month";d.textContent=daysInPrev-i;grid.appendChild(d);}
    for(let i=1;i<=daysInMonth;i++){
        const d=document.createElement("div");d.className="cal-day";d.textContent=i;
        const ds=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
        if(i===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear())d.classList.add("today");
        if(events.some(e=>e.date===ds))d.classList.add("has-event");
        d.onclick=()=>{document.getElementById("eventDate").value=ds;showEventForm();};
        grid.appendChild(d);
    }
    const total=firstDay+daysInMonth;const rem=(7-total%7)%7;
    for(let i=1;i<=rem;i++){const d=document.createElement("div");d.className="cal-day other-month";d.textContent=i;grid.appendChild(d);}
}
function renderCountdowns(){
    const section=document.getElementById("countdownSection");
    if(events.length===0){section.innerHTML='<div class="countdown-empty">点击 ➕ 添加倒计时事件</div>';return;}
    const now=new Date();now.setHours(0,0,0,0);
    const sorted=[...events].sort((a,b)=>Math.abs(new Date(a.date)-now)-Math.abs(new Date(b.date)-now)).slice(0,3);
    section.innerHTML=sorted.map(e=>{
        const target=new Date(e.date);target.setHours(0,0,0,0);
        const diff=Math.round((target-now)/(1000*60*60*24));
        let text,cls;
        if(diff>0){text=`还有 ${diff} 天`;cls="";}
        else if(diff===0){text="就是今天！";cls="";}
        else{text=`已过 ${Math.abs(diff)} 天`;cls="past";}
        return `<div class="countdown-item"><span class="countdown-label">${e.icon||"📌"} ${e.name}</span><span style="display:flex;align-items:center;gap:6px"><span class="countdown-days ${cls}">${text}</span><button class="cd-delete" onclick="deleteEvent(${events.indexOf(e)})">✕</button></span></div>`;
    }).join("");
}
function changeMonth(d){viewMonth+=d;if(viewMonth<0){viewMonth=11;viewYear--;}if(viewMonth>11){viewMonth=0;viewYear++;}renderCalendar();}
function showEventForm(){document.getElementById("eventOverlay").classList.add("show");if(!document.getElementById("eventDate").value){const t=today;document.getElementById("eventDate").value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;}document.getElementById("eventName").focus();}
function hideEventForm(){document.getElementById("eventOverlay").classList.remove("show");document.getElementById("eventName").value="";document.getElementById("eventIcon").value="";}
function addEvent(){const n=document.getElementById("eventName").value.trim(),d=document.getElementById("eventDate").value,ic=document.getElementById("eventIcon").value.trim();if(!n||!d)return;events.push({name:n,date:d,icon:ic||"📌"});localStorage.setItem("calEvents",JSON.stringify(events));hideEventForm();render();}
function deleteEvent(i){events.splice(i,1);localStorage.setItem("calEvents",JSON.stringify(events));render();}
init();
setInterval(()=>{renderCountdowns();},60000);
</script>
</body>
</html>
