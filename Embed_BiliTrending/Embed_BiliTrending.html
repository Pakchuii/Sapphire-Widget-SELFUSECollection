<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>B站热搜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:"Segoe UI","Microsoft YaHei",sans-serif;color:#2d3748}
.card{width:100%;height:100%;border-radius:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(55px);-webkit-backdrop-filter:blur(55px);display:flex;flex-direction:column;padding:12px 0;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.5);overflow:hidden;position:relative}

.header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:8px;flex-shrink:0}
.title{font-size:14px;font-weight:700;color:#fb7299;display:flex;align-items:center;gap:6px}
.title img{width:18px;height:18px;border-radius:4px}
.refresh-btn{background:rgba(0,0,0,0.04);border:none;border-radius:6px;width:24px;height:24px;font-size:12px;cursor:pointer;color:#64748b;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.refresh-btn:hover{background:rgba(0,0,0,0.08);color:#2d3748}
.refresh-btn.spin{animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

.list{flex:1;overflow-y:auto;padding:0 8px}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

.item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;transition:background 0.2s;cursor:default}
.item:hover{background:rgba(0,0,0,0.04)}
.rank{font-size:14px;font-weight:800;color:#94a3b8;width:18px;text-align:center;flex-shrink:0}
.item:nth-child(1) .rank{color:#ef4444}
.item:nth-child(2) .rank{color:#f97316}
.item:nth-child(3) .rank{color:#eab308}

.keyword{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#333}
.icon{height:14px;object-fit:contain}

.status{text-align:center;padding:20px;color:#94a3b8;font-size:12px}
</style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="title">
            📺 B站热搜榜
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">🔄</button>
    </div>
    <div class="list" id="list">
        <div class="status">加载中...</div>
    </div>
</div>
<script>
async function fetchData() {
    const btn = document.getElementById("refreshBtn");
    const list = document.getElementById("list");
    btn.classList.add("spin");
    
    try {
        // Fetch Bilibili search trending via codetabs CORS proxy
        const url = `https://api.bilibili.com/x/web-interface/search/square?limit=10&t=${Date.now()}`;
        const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
        if(!res.ok) throw new Error("获取失败");
        const data = await res.json();
        
        if(data.code !== 0 || !data.data?.trending?.list) {
            throw new Error("数据格式错误");
        }
        
        list.innerHTML = "";
        data.data.trending.list.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "item";
            
            const rank = document.createElement("div");
            rank.className = "rank";
            rank.textContent = index + 1;
            
            const kw = document.createElement("div");
            kw.className = "keyword";
            kw.textContent = item.keyword;
            kw.title = item.keyword;
            
            div.appendChild(rank);
            div.appendChild(kw);
            
            if(item.icon) {
                const img = document.createElement("img");
                img.className = "icon";
                img.src = item.icon;
                div.appendChild(img);
            }
            
            list.appendChild(div);
        });
    } catch (e) {
        list.innerHTML = `<div class="status">❌ 加载失败<br><br>${e.message}</div>`;
    } finally {
        btn.classList.remove("spin");
    }
}

fetchData();
// Auto refresh every 30 minutes
setInterval(fetchData, 30 * 60 * 1000);
</script>
</body>
</html>
