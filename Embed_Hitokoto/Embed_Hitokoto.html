<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>一言</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:"ZCOOL KuaiLe","Segoe UI","Microsoft YaHei",sans-serif;color:#2d3748}
.card{width:100%;height:100%;border-radius:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(55px);-webkit-backdrop-filter:blur(55px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.5);overflow:hidden;cursor:pointer;transition:background 0.3s;position:relative}
.card:hover{background:rgba(255,255,255,0.95)}

.quote-mark{font-size:36px;opacity:0.1;line-height:1;margin-bottom:4px;flex-shrink:0;user-select:none}

.quote-text{font-size:18px;line-height:1.8;text-align:center;max-height:60%;overflow:hidden;transition:opacity 0.4s ease;word-break:break-word}
.quote-text.fade{opacity:0}

.quote-from{font-size:12px;color:#94a3b8;margin-top:8px;text-align:center;transition:opacity 0.4s ease;flex-shrink:0}
.quote-from.fade{opacity:0}

.hint{position:absolute;bottom:8px;right:12px;font-size:10px;color:#cbd5e1;opacity:0;transition:opacity 0.3s}
.card:hover .hint{opacity:1}

.type-tag{position:absolute;top:10px;left:14px;font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(99,102,241,0.08);color:#6366f1;opacity:0;transition:opacity 0.3s}
.card:hover .type-tag{opacity:1}
</style>
</head>
<body>
<div class="card" onclick="fetchQuote()">
    <div class="type-tag" id="typeTag"></div>
    <div class="quote-mark">❝</div>
    <div class="quote-text" id="quoteText">加载中...</div>
    <div class="quote-from" id="quoteFrom"></div>
    <div class="hint">点击换一句</div>
</div>
<script>
const typeMap = {
    a: "动画", b: "漫画", c: "游戏", d: "文学",
    e: "原创", f: "来自网络", g: "其他",
    h: "影视", i: "诗词", j: "网易云", k: "哲学", l: "抖机灵"
};

async function fetchQuote() {
    const text = document.getElementById("quoteText");
    const from = document.getElementById("quoteFrom");

    // Fade out
    text.classList.add("fade");
    from.classList.add("fade");

    try {
        const res = await fetch("https://v1.hitokoto.cn/?encode=json");
        const data = await res.json();

        setTimeout(() => {
            text.textContent = data.hitokoto || "...";
            const source = data.from || "";
            const author = data.from_who || "";
            let fromText = "";
            if (source && author) fromText = `—— ${author}「${source}」`;
            else if (source) fromText = `——「${source}」`;
            else if (author) fromText = `—— ${author}`;
            from.textContent = fromText;

            const tag = document.getElementById("typeTag");
            tag.textContent = typeMap[data.type] || "";

            text.classList.remove("fade");
            from.classList.remove("fade");
        }, 400);
    } catch (e) {
        setTimeout(() => {
            text.textContent = "网络错误，点击重试";
            from.textContent = "";
            text.classList.remove("fade");
            from.classList.remove("fade");
        }, 400);
    }
}

fetchQuote();
// Auto refresh every 30 seconds
setInterval(fetchQuote, 30000);
</script>
</body>
</html>
