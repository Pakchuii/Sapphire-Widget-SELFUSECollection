<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>DeepSeek 助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:transparent;font-family:"Segoe UI","Microsoft YaHei",sans-serif;color:#2d3748}
.card{width:100%;height:100%;border-radius:16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(55px);-webkit-backdrop-filter:blur(55px);display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(0,0,0,0.08);border:1px solid rgba(255,255,255,0.5);overflow:hidden;position:relative}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,0.06)}
.chat-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.chat-title span{color:#4d6bfe;font-weight:800}
.hdr-btns{display:flex;gap:4px}
.hdr-btn{background:none;border:none;font-size:13px;cursor:pointer;opacity:0.4;padding:2px 6px;border-radius:6px;transition:all 0.2s}
.hdr-btn:hover{opacity:0.8;background:rgba(0,0,0,0.05)}

.messages{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

.msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word;animation:msgIn 0.3s ease}
.msg-user{align-self:flex-end;background:rgba(77,107,254,0.12);color:#3451c7;border-bottom-right-radius:4px}
.msg-ai{align-self:flex-start;background:rgba(0,0,0,0.04);color:#374151;border-bottom-left-radius:4px}
.msg-ai pre{background:rgba(0,0,0,0.04);padding:6px 8px;border-radius:6px;overflow-x:auto;font-size:12px;margin:4px 0}
.msg-ai code{font-size:12px;background:rgba(0,0,0,0.05);padding:1px 4px;border-radius:3px}
.msg-system{align-self:center;font-size:11px;color:#94a3b8;padding:4px 8px}
.msg-loading{align-self:flex-start;color:#94a3b8;font-size:12px}
.dot-anim::after{content:"";animation:dots 1.5s infinite}
@keyframes dots{0%{content:""}33%{content:"."}66%{content:".."}100%{content:"..."}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.input-row{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;border-top:1px solid rgba(0,0,0,0.06)}
.chat-input{flex:1;padding:8px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.02);color:#2d3748;font-size:13px;outline:none;font-family:inherit}
.chat-input:focus{border-color:#4d6bfe;box-shadow:0 0 0 2px rgba(77,107,254,0.1)}
.send-btn{width:36px;height:36px;border-radius:50%;border:none;background:#4d6bfe;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.send-btn:hover{background:#3a57e8;transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

.overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);z-index:10;align-items:center;justify-content:center;border-radius:16px}
.overlay.show{display:flex}
.form{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.form h3{margin-bottom:8px;font-size:15px;text-align:center}
.form p{font-size:11px;color:#94a3b8;text-align:center;margin-bottom:12px;line-height:1.4}
.form input,.form select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#f7fafc;color:#2d3748;font-size:13px;outline:none;margin-bottom:12px}
.form input:focus,.form select:focus{border-color:#4d6bfe;box-shadow:0 0 0 3px rgba(77,107,254,0.1)}
.form label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px}
.form-btns{display:flex;gap:8px}
.form-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.btn-ok{background:#4d6bfe;color:#fff}
.btn-cancel{background:#f1f5f9;color:#64748b}
</style>
</head>
<body>
<div class="card">
    <div class="chat-header">
        <div class="chat-title">🐋 <span>DeepSeek</span> 助手</div>
        <div class="hdr-btns">
            <button class="hdr-btn" onclick="clearChat()" title="清空对话">🗑️</button>
            <button class="hdr-btn" onclick="showKeyForm()" title="设置">🔑</button>
        </div>
    </div>
    <div class="messages" id="messages">
        <div class="msg msg-system">点击 🔑 设置 DeepSeek API Key 开始对话</div>
    </div>
    <div class="input-row">
        <input class="chat-input" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}" />
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
    </div>
    <div class="overlay" id="keyOverlay">
        <div class="form">
            <h3>🔑 设置</h3>
            <p>前往 <b>platform.deepseek.com</b> 获取 API Key</p>
            <label>API Key</label>
            <input id="keyInput" placeholder="粘贴你的 DeepSeek API Key" type="password" onkeydown="if(event.key==='Enter')saveKey()" />
            <label>模型</label>
            <select id="modelSelect">
                <option value="deepseek-chat">DeepSeek-V3（推荐）</option>
                <option value="deepseek-reasoner">DeepSeek-R1（推理）</option>
            </select>
            <div class="form-btns">
                <button class="btn-cancel" onclick="hideKeyForm()">取消</button>
                <button class="btn-ok" onclick="saveKey()">保存</button>
            </div>
        </div>
    </div>
</div>
<script>
let apiKey = localStorage.getItem("dsKey") || "";
let model = localStorage.getItem("dsModel") || "deepseek-chat";
let chatHistory = JSON.parse(localStorage.getItem("dsHistory") || "[]");
let sending = false;

function init() {
    if (chatHistory.length > 0) {
        document.getElementById("messages").innerHTML = "";
        chatHistory.forEach(m => appendMsg(m.role === "user" ? "user" : "ai", m.content, false));
        scrollBottom();
    }
    if (!apiKey) showKeyForm();
}

function appendMsg(role, text, scroll = true) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    if (role === "user") {
        div.className = "msg msg-user";
        div.textContent = text;
    } else if (role === "ai") {
        div.className = "msg msg-ai";
        let html = escapeHtml(text);
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
        html = html.replace(/\n/g, '<br>');
        div.innerHTML = html;
    } else {
        div.className = "msg msg-system";
        div.textContent = text;
    }
    msgs.appendChild(div);
    if (scroll) scrollBottom();
}

function scrollBottom() {
    const msgs = document.getElementById("messages");
    msgs.scrollTop = msgs.scrollHeight;
}

async function sendMsg() {
    if (sending) return;
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text) return;
    if (!apiKey) { showKeyForm(); return; }

    input.value = "";
    appendMsg("user", text);
    chatHistory.push({ role: "user", content: text });

    sending = true;
    document.getElementById("sendBtn").disabled = true;
    const loadDiv = document.createElement("div");
    loadDiv.className = "msg msg-loading dot-anim";
    loadDiv.textContent = "思考中";
    document.getElementById("messages").appendChild(loadDiv);
    scrollBottom();

    try {
        const res = await fetch("https://api.deepseek.com/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + apiKey
            },
            body: JSON.stringify({
                model: model,
                messages: chatHistory,
                max_tokens: 2048
            })
        });

        loadDiv.remove();

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || "（无回复）";

        appendMsg("ai", reply);
        chatHistory.push({ role: "assistant", content: reply });
        localStorage.setItem("dsHistory", JSON.stringify(chatHistory));
    } catch (e) {
        loadDiv.remove();
        appendMsg("system", "❌ " + e.message);
    }

    sending = false;
    document.getElementById("sendBtn").disabled = false;
}

function clearChat() {
    chatHistory = [];
    localStorage.setItem("dsHistory", "[]");
    document.getElementById("messages").innerHTML = '<div class="msg msg-system">对话已清空</div>';
}

function showKeyForm() {
    document.getElementById("keyInput").value = apiKey;
    document.getElementById("modelSelect").value = model;
    document.getElementById("keyOverlay").classList.add("show");
    document.getElementById("keyInput").focus();
}
function hideKeyForm() { document.getElementById("keyOverlay").classList.remove("show"); }
function saveKey() {
    const v = document.getElementById("keyInput").value.trim();
    if (!v) return;
    apiKey = v;
    model = document.getElementById("modelSelect").value;
    localStorage.setItem("dsKey", v);
    localStorage.setItem("dsModel", model);
    hideKeyForm();
    if (chatHistory.length === 0) {
        document.getElementById("messages").innerHTML = '<div class="msg msg-system">准备就绪！开始对话吧 🐋</div>';
    }
}

function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

init();
</script>
</body>
</html>
